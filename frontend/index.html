<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nutri-Diet-Wizard</title>
    
    <!-- This script links to the Tailwind CSS library -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
    @keyframes gradient-animation {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }
    .animated-gradient {
        background-size: 200% 200%;
        animation: gradient-animation 15s ease infinite;
    }
</style>
</head>

<body class="bg-gray-900 font-sans">

    <!-- Animated Gradient Background -->
    <div class="fixed inset-0 z-0 bg-gradient-to-br from-purple-600 via-blue-500 to-green-400 animated-gradient"></div>

    <!-- Main Content Container -->
    <div class="relative min-h-screen flex items-center justify-center z-10">
        
        <!-- Glassmorphism Login Card -->
        <div class="w-full max-w-md p-8 space-y-6 bg-black/20 backdrop-blur-xl rounded-3xl shadow-2xl">
            
            <!-- Header -->
            <div class="text-center">
                <h2 id="form-title" class="text-4xl font-bold text-white">Sign In</h2>
                <p class="text-gray-200 mt-2">Welcome back to your Diet Wizard</p>
            </div>

            <!-- Login Form -->
<form id="login-form" class="space-y-6">
    <!-- Username/Email Input -->
    <div>
        <label for="username" class="text-sm font-medium text-gray-200">Email</label>
        <input 
            type="email" 
            id="username" 
            name="username"
            placeholder="e.g., davidAde@example.com"
            required
            class="w-full px-4 py-3 mt-2 bg-black/30 text-white border border-transparent rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 transition"
        >
    </div>

    <!-- Password Input -->
    <div>
        <label for="password" class="text-sm font-medium text-gray-200">Password</label>
        <input 
            type="password" 
            id="password" 
            name="password"
            placeholder="Enter your password"
            required
            class="w-full px-4 py-3 mt-2 bg-black/30 text-white border border-transparent rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 transition"
        >
    </div>
    
    <!-- Confirm Password Input (Initially Hidden) -->
    <div id="confirm-password-field" class="hidden">
        <label for="confirm-password" class="text-sm font-medium text-gray-200">Confirm Password</label>
        <input 
            type="password" 
            id="confirm-password" 
            name="confirm-password"
            placeholder="Confirm your password"
            class="w-full px-4 py-3 mt-2 bg-black/30 text-white border border-transparent rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 transition"
        >
    </div>

    <!-- Submit Button -->
    <button 
        type="submit"
        id="form-button"
        class="w-full py-3 font-semibold text-white bg-white/10 border border-white/20 rounded-xl backdrop-blur-sm hover:bg-white/20 focus:outline-none focus:ring-2 focus:ring-white/50 transition-colors"
    >
        Sign In
    </button>

    <!-- Toggle Link -->
    <p class="text-center text-gray-300">
        <a href="#" id="toggle-link" class="font-medium hover:text-blue-400">Don't have an account? Sign Up</a>
    </p>
</form>

        </div>
    </div>
    <!-- Link to our custom JavaScript file -->
    <script type="module" src="script.js"></script>
</body>
</body>
</html>
