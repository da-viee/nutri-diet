<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nutri-Diet-Wizard - Meal History</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes gradient-animation {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .animated-gradient {
            background-size: 200% 200%;
            animation: gradient-animation 15s ease infinite;
        }
    </style>
</head>
<body class="bg-gray-900 font-sans text-white">

    <!-- Animated Gradient Background -->
    <div class="fixed inset-0 z-0 bg-gradient-to-br from-purple-600 via-blue-500 to-green-400 animated-gradient"></div>

    <!-- Main Content Container -->
    <div class="relative min-h-screen flex items-center justify-center z-10 p-4">
        
        <!-- Glassmorphism History Card -->
        <div class="w-full max-w-4xl p-8 space-y-6 bg-black/20 backdrop-blur-xl rounded-3xl shadow-2xl">
            
            <!-- Header -->
            <div class="flex justify-between items-center">
                <h2 class="text-4xl font-bold">Meal History</h2>
                <a href="dashboard.html" class="px-4 py-2 font-semibold bg-white/10 border border-white/20 rounded-xl backdrop-blur-sm hover:bg-white/20 transition">← Back to Dashboard</a>
            </div>

            <!-- Container for History Records -->
            <div id="history-container" class="space-y-4 max-h-[60vh] overflow-y-auto pr-4">
                <!-- History records will be dynamically inserted here -->
                <p class="text-center text-gray-400 py-10">Loading history...</p>
            </div>

            <!-- Logout Button -->
            <button id="logout-btn" class="w-full mt-4 py-3 font-semibold text-white bg-white/10 border border-white/20 rounded-xl backdrop-blur-sm hover:bg-white/20 transition">
                Logout
            </button>

        </div>
    </div>
    
    <script type="module" src="history.js"></script>
</body>
</html>
