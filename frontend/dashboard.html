<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nutri-Diet-Wizard - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes gradient-animation {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .animated-gradient {
            background-size: 200% 200%;
            animation: gradient-animation 15s ease infinite;
        }
    </style>
</head>
<body class="bg-gray-900 font-sans text-white">

    <div class="fixed inset-0 z-0 bg-gradient-to-br from-purple-600 via-blue-500 to-green-400 animated-gradient"></div>

    <div class="relative min-h-screen flex items-center justify-center z-10 p-4">
        <div class="w-full max-w-4xl p-8 space-y-6 bg-black/20 backdrop-blur-xl rounded-3xl shadow-2xl">
            <div class="text-center">
                <h2 id="welcome-message" class="text-4xl font-bold">Loading...</h2>
                <p class="text-gray-200 mt-2">Here is your personalized plan for today.</p>
            </div>

            <div class="space-y-4">
                <h3 class="text-2xl font-semibold text-blue-300 border-b-2 border-blue-400/50 pb-2">Today's Meal Plan</h3>
                <div class="p-4 bg-black/20 rounded-xl">
                    <h4 class="font-bold text-lg">Breakfast</h4>
                    <p id="breakfast-recommendation" class="text-gray-300">Calculating...</p>
                </div>
                <div class="p-4 bg-black/20 rounded-xl">
                    <h4 class="font-bold text-lg">Lunch</h4>
                    <p id="lunch-recommendation" class="text-gray-300">Calculating...</p>
                </div>
                <div class="p-4 bg-black/20 rounded-xl">
                    <h4 class="font-bold text-lg">Dinner</h4>
                    <p id="dinner-recommendation" class="text-gray-300">Calculating...</p>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-6">
                <div class="p-4 bg-black/20 rounded-xl">
                    <h4 class="font-bold text-lg">Water Intake</h4>
                    <p class="text-gray-300 mb-3">Goal: 8 glasses</p>
                    <div class="flex items-center justify-between">
                        <span id="water-count" class="text-2xl font-bold">0 / 8</span>
                        <div class="flex space-x-2">
                            <button id="subtract-water-btn" class="w-10 h-10 font-bold text-2xl bg-white/10 border border-white/20 rounded-full backdrop-blur-sm hover:bg-white/20 transition">-</button>
                            <button id="add-water-btn" class="w-10 h-10 font-bold text-2xl bg-white/10 border border-white/20 rounded-full backdrop-blur-sm hover:bg-white/20 transition">+</button>
                        </div>
                    </div>
                </div>
                <div class="p-4 bg-black/20 rounded-xl">
                    <h4 class="font-bold text-lg">Sleep Log</h4>
                    <p id="last-sleep-log" class="text-gray-300 mb-3">No sleep logged yet.</p>
                    <div class="flex items-center space-x-2">
                        <input type="number" id="sleep-input" placeholder="Hours" class="w-full px-3 py-2 bg-black/30 text-white border border-transparent rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <button id="log-sleep-btn" class="px-4 py-2 font-semibold bg-white/10 border border-white/20 rounded-xl backdrop-blur-sm hover:bg-white/20 transition">Log</button>
                    </div>
                </div>
            </div>
            
            <div class="grid grid-cols-3 gap-4 mt-6">
                <a href="history.html" class="block text-center w-full py-3 font-semibold text-white bg-white/10 border border-white/20 rounded-xl backdrop-blur-sm hover:bg-white/20 transition">Meal History</a>
                <a href="settings.html" class="block text-center w-full py-3 font-semibold text-white bg-white/10 border border-white/20 rounded-xl backdrop-blur-sm hover:bg-white/20 transition">Settings</a>
                <button id="logout-btn" class="w-full py-3 font-semibold text-white bg-white/10 border border-white/20 rounded-xl backdrop-blur-sm hover:bg-white/20 transition">Logout</button>
            </div>
        </div>
    </div>
    
    <!-- The ONLY script tag here should be for dashboard.js -->
    <script type="module" src="dashboard.js"></script>
</body>
</html>
