<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nutri-Diet-Wizard - Select Foods</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes gradient-animation {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .animated-gradient {
            background-size: 200% 200%;
            animation: gradient-animation 15s ease infinite;
        }
    </style>
</head>
<body class="bg-gray-900 font-sans">

    <!-- Animated Gradient Background -->
    <div class="fixed inset-0 z-0 bg-gradient-to-br from-purple-600 via-blue-500 to-green-400 animated-gradient"></div>

    <!-- Main Content Container -->
    <div class="relative min-h-screen flex items-center justify-center z-10 p-4">
        
        <!-- Glassmorphism Food Selection Card -->
        <div class="w-full max-w-4xl p-8 space-y-6 bg-black/20 backdrop-blur-xl rounded-3xl shadow-2xl">
            
            <!-- Header -->
            <div class="text-center">
                <h2 class="text-4xl font-bold text-white">Select Your Available Foods</h2>
                <p class="text-gray-200 mt-2">Choose all the items you have regular access to.</p>
            </div>

            <!-- Container for Food Categories -->
            <div id="food-selection-container" class="space-y-6 max-h-[60vh] overflow-y-auto pr-4">
                <!-- Food categories and checkboxes will be dynamically inserted here by JavaScript -->
                <p class="text-center text-gray-400 py-10">Loading food list...</p>
            </div>

            <!-- Finish Button -->
            <button 
                id="finish-setup-button"
                class="w-full py-3 font-semibold text-white bg-white/10 border border-white/20 rounded-xl backdrop-blur-sm hover:bg-white/20 focus:outline-none focus:ring-2 focus:ring-white/50 transition-colors"
            >
                Finish Setup
            </button>

        </div>
    </div>
    
    <!-- Link to our new food selection script -->
    <script type="module" src="food-selection.js"></script>

</body>
</html>
