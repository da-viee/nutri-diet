<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nutri-Diet-Wizard - Settings</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .animated-gradient { background-size: 200% 200%; animation: gradient-animation 15s ease infinite; }
        @keyframes gradient-animation { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    </style>
</head>
<body class="bg-gray-900 font-sans text-white">
    <div class="fixed inset-0 z-0 bg-gradient-to-br from-purple-600 via-blue-500 to-green-400 animated-gradient"></div>
    <div class="relative min-h-screen flex items-center justify-center z-10 p-4">
        <div class="w-full max-w-2xl p-8 space-y-6 bg-black/20 backdrop-blur-xl rounded-3xl shadow-2xl">
            <div class="flex justify-between items-center">
                <h2 class="text-4xl font-bold">Your Profile</h2>
                <a href="dashboard.html" class="px-4 py-2 font-semibold bg-white/10 border border-white/20 rounded-xl backdrop-blur-sm hover:bg-white/20 transition">← Back to Dashboard</a>
            </div>
            <form id="settings-form" class="space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label for="region" class="text-sm font-medium">Region</label>
                        <select id="region" required class="w-full mt-2 px-4 py-3 bg-black/30 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500"></select>
                    </div>
                    <div>
                        <label for="activity-level" class="text-sm font-medium">Activity Level</label>
                        <select id="activity-level" required class="w-full mt-2 px-4 py-3 bg-black/30 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500"></select>
                    </div>
                    <div>
                        <label for="sleep-hours" class="text-sm font-medium">Sleep Hours per Night</label>
                        <input type="number" id="sleep-hours" required class="w-full mt-2 px-4 py-3 bg-black/30 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label for="medical-history" class="text-sm font-medium">Medical History</label>
                        <input type="text" id="medical-history" required class="w-full mt-2 px-4 py-3 bg-black/30 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div class="md:col-span-2">
                        <label for="available-foods" class="text-sm font-medium">Available Foods (comma-separated)</label>
                        <textarea id="available-foods" required rows="3" class="w-full mt-2 px-4 py-3 bg-black/30 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
                    </div>
                </div>
                <button type="submit" class="w-full py-3 font-semibold text-white bg-white/10 border border-white/20 rounded-xl backdrop-blur-sm hover:bg-white/20 transition">
                    Save Changes
                </button>
            </form>
        </div>
    </div>
    <script type="module" src="settings.js"></script>
</body>
</html>
